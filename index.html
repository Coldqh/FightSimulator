      fight.roundCards.unshift("Раунд " + fight.round + ": " + playerCard + "-" + opponentCard);
      fight.roundsCompleted = fight.round;
      pushFightLine(fight, "Раунд " + fight.round + " завершен: " + playerCard + "-" + opponentCard + ".");
      if (roundCommentary) {
        pushFightLine(fight, roundCommentary);
      }
      pushLog("Раунд " + fight.round + " завершен. Карточка судей: " + playerCard + "-" + opponentCard + ".", "warn");
      if (fight.round >= fight.roundLimit) {
        decision = safeFightDecisionResult(fight);
        finalizeFight(decision.result, decision.method, decision.lines);
        return;
      }
      playerHeal = Math.min(fight.playerState.maxHp - fight.playerState.hp, Math.round(fight.playerState.maxHp * Math.max(0, healthRecoveryPercent + fightContextBySide(fight, "player").roundHealthPercent) / 100));
      opponentHeal = Math.min(fight.opponentState.maxHp - fight.opponentState.hp, Math.round(fight.opponentState.maxHp * Math.max(0, healthRecoveryPercent + fightContextBySide(fight, "opponent").roundHealthPercent) / 100));
      playerStaminaGain = Math.min(fight.playerState.maxStamina - fight.playerState.stamina, Math.round(fight.playerState.maxStamina * Math.max(0, 40 + fightContextBySide(fight, "player").roundStaminaPercent) / 100));
      opponentStaminaGain = Math.min(fight.opponentState.maxStamina - fight.opponentState.stamina, Math.round(fight.opponentState.maxStamina * Math.max(0, 40 + fightContextBySide(fight, "opponent").roundStaminaPercent) / 100));
      fight.playerState.hp = clamp(fight.playerState.hp + playerHeal, 0, fight.playerState.maxHp);
      fight.opponentState.hp = clamp(fight.opponentState.hp + opponentHeal, 0, fight.opponentState.maxHp);
      fight.playerState.stamina = clamp(fight.playerState.stamina + playerStaminaGain, 0, fight.playerState.maxStamina);
      fight.opponentState.stamina = clamp(fight.opponentState.stamina + opponentStaminaGain, 0, fight.opponentState.maxStamina);
      fight.breakSummary = {
        nextRound: fight.round + 1,
        healthRecoveryPercent: healthRecoveryPercent,
        playerHeal: playerHeal,
        opponentHeal: opponentHeal,
        playerStamina: playerStaminaGain,
        opponentStamina: opponentStaminaGain
      };
      fight.actionLock = false;
      state.panel = "fightBreak";
      if (!updateBattleSubtree({ suppressSave: true })) {
        render();
      }
      endBattleRenderCounting();
    }

    function completeFightTurn() {
      var fight = state.fight;
      var playerStaminaRecovery;
      var opponentStaminaRecovery;
      consumeFightStepTimeout();
      if (!fight || fight.result || fight.knockdown) {
        return;
      }
      sanitizeFightState(fight, "complete_turn");
      fight.guardStepCount = Math.max(0, finiteNumber(fight.guardStepCount, 0)) + 1;
      if (maybeStopFightByDamage(fight, "complete_turn")) {
        return;
      }
      if (maybeForceStopFight(fight, "complete_turn")) {
        return;
      }
      pushFightLine(fight, "Ход " + fight.turn + " завершен.");
      if (!fight.skipTurnRecovery) {
        fight.playerState.hp = clamp(fight.playerState.hp + turnHealthRecovery(fight, "player"), 0, fight.playerState.maxHp);
        fight.opponentState.hp = clamp(fight.opponentState.hp + turnHealthRecovery(fight, "opponent"), 0, fight.opponentState.maxHp);
        playerStaminaRecovery = Math.max(0, (fight.playerState.actedAttack ? 2 : 4) + developmentScalarBonus(state.fighter, "turnRecoveryStamina") + Math.round(fightContextBySide(fight, "player").turnStaminaRecovery || 0));
        opponentStaminaRecovery = Math.max(0, (fight.opponentState.actedAttack ? 2 : 4) + developmentScalarBonus(currentFightSideFighter(fight, "opponent"), "turnRecoveryStamina") + Math.round(fightContextBySide(fight, "opponent").turnStaminaRecovery || 0));
        fight.playerState.stamina = clamp(fight.playerState.stamina + playerStaminaRecovery, 0, fight.playerState.maxStamina);
        fight.opponentState.stamina = clamp(fight.opponentState.stamina + opponentStaminaRecovery, 0, fight.opponentState.maxStamina);
      }
      fight.skipTurnRecovery = false;
      fight.playerState.actedAttack = false;
      fight.opponentState.actedAttack = false;
      if (maybeStopFightByDamage(fight, "post_turn_recovery")) {
        return;
      }
      if (fight.turn >= fight.turnsPerRound) {
        finishFightRound();
        return;
      }
      fight.turn += 1;
      fight.aiActionsLeft = 1;
      fight.actionLock = false;
      if (!updateBattleSubtree({ suppressSave: true })) {
        render();
      }
      endBattleRenderCounting();
    }

    function startNextRound() {
      var fight = state.fight;
      clearFightTimers();
      if (!fight || fight.result) {
        return;
      }
      sanitizeFightState(fight, "start_next_round");
      fight.guardStepCount = Math.max(0, finiteNumber(fight.guardStepCount, 0)) + 1;
      if (maybeForceStopFight(fight, "start_next_round")) {
        return;
      }
      fight.round += 1;
      fight.turn = 1;
      fight.aiActionsLeft = 1;
      fight.roundPoints = { player: 0, opponent: 0 };
      fight.roundKnockdowns = { player: 0, opponent: 0 };
      resetFightRoundStats(fight);
      fight.breakSummary = null;
      fight.knockdown = null;
      fight.skipTurnRecovery = false;
      fight.animation = null;
      fight.actionLock = false;
      fight.playerState.actedAttack = false;
      fight.opponentState.actedAttack = false;
      fight.playerState.defenseMode = null;
      fight.opponentState.defenseMode = null;
      resetActionChain(fight.playerState);
      resetActionChain(fight.opponentState);
      resetCounterChain(fight.playerState);
      resetCounterChain(fight.opponentState);
      resetRingPositions(fight);
      pushFightLine(fight, "Начинается раунд " + fight.round + ". После перерыва бойцы снова сходятся в центре.");
      state.panel = "fightLive";
      if (!updateBattleSubtree({ suppressSave: true })) {
        render();
      }
    }

    function renderFightBreakPanel() {
      var fight = state.fight;
      var summary = fight.breakSummary;
      return "" +
        "<div class='battle-shell'><div class='battle-result'>" +
          "<div class='result-banner'><div class='eyebrow'>Перерыв</div><div class='title' style='font-size:24px'>Раунд " + fight.round + " завершен</div>" +
          "<div class='subtitle'>Дальше начнется раунд " + summary.nextRound + ".</div></div>" +
          "<div class='battle-bottom' style='margin-top:12px'>" +
            "<div class='battle-column'><div class='battle-panel'><strong>Твой угол</strong>" +
              "<div class='battle-chip-line'><div class='chip gold'>Здоровье +" + summary.playerHeal + " (" + summary.healthRecoveryPercent + "%)</div><div class='chip'>Стамина +" + summary.playerStamina + "</div></div>" +
              meter("Прочность", fight.playerState.hp, fight.playerState.maxHp) +
              meter("Стамина", fight.playerState.stamina, fight.playerState.maxStamina) +
            "</div></div>" +
            "<div class='battle-column right'><div class='battle-panel'><strong>Его угол</strong>" +
              "<div class='battle-chip-line'><div class='chip red'>Здоровье +" + summary.opponentHeal + " (" + summary.healthRecoveryPercent + "%)</div><div class='chip'>Стамина +" + summary.opponentStamina + "</div></div>" +
              meter("Прочность", fight.opponentState.hp, fight.opponentState.maxHp) +
              meter("Стамина", fight.opponentState.stamina, fight.opponentState.maxStamina) +
            "</div></div>" +
          "</div>" +
          "<div class='footer-actions'><button class='button' onclick='startNextRound()'>Начать следующий раунд</button></div>" +
        "</div></div>";
    }

    function finishPlayerFightAction() {
      consumeFightStepTimeout();
      if (!state.fight) {
        return;
      }
      if (!state.fight || state.fight.result || state.fight.knockdown) {
        return;
      }
      runAiAfterPlayer();
    }

    function finishAiFightAction() {
      consumeFightStepTimeout();
      if (!state.fight) {
        return;
      }
      if (!state.fight || state.fight.result || state.fight.knockdown) {
        return;
      }
      completeFightTurn();
    }

    function runAiAfterPlayer() {
      var fight = state.fight;
      var aiActionKey;
      var strikeOutcome;
      consumeFightStepTimeout();
      if (!fight || fight.result || fight.knockdown) {
        return;
      }
      sanitizeFightState(fight, "ai_turn");
      if (maybeForceStopFight(fight, "ai_turn")) {
        return;
      }
      if (fight.aiActionsLeft <= 0) {
        completeFightTurn();
        return;
      }
      aiActionKey = pickAiAction(fight);
      if (!aiActionKey) {
        fight.aiActionsLeft = 0;
        pushFightLine(fight, fullOpponentName(fight.opponent) + " теряет темп и пропускает действие.");
        completeFightTurn();
        return;
      }
      if (FIGHT_ACTIONS[aiActionKey].type === "move") {
        moveActor(fight, "opponent", aiActionKey);
        fight.aiActionsLeft = 0;
        if (!updateBattleSubtree({ suppressSave: true })) {
          render();
        }
        scheduleFightStep("completeFightTurn", ACTION_DELAY_MS);
        return;
      }
      if (FIGHT_ACTIONS[aiActionKey].type === "defense") {
        applyDefenseAction(fight, "opponent", aiActionKey);
        fight.aiActionsLeft = 0;
        if (!updateBattleSubtree({ suppressSave: true })) {
          render();
        }
        scheduleFightStep("completeFightTurn", ACTION_DELAY_MS);
        return;
      }
      strikeOutcome = strikeActor(fight, "opponent", aiActionKey);
      fight.aiActionsLeft = 0;
      if (!updateBattleSubtree({ suppressSave: true })) {
        render();
      }
      if (strikeOutcome) {
        return;
      }
      scheduleFightStep("finishAiFightAction", ACTION_DELAY_MS);
    }

    function fightAction(actionKey) {
      var fight = state.fight;
      var action = FIGHT_ACTIONS[actionKey];
      var actionStarted;
      var strikeOutcome;
      if (!fight || fight.result || !action || fight.actionLock) {
        return;
      }
      actionStarted = nowMs();
      beginBattleActionMetrics();
      sanitizeFightState(fight, "player_action");
      if (maybeForceStopFight(fight, "player_action")) {
        return;
      }
      if (!canUseFightAction(fight, "player", actionKey)) {
        pushFightLine(fight, "Это действие сейчас недоступно из-за позиции на ринге или нехватки стамины.");
        if (!updateBattleSubtree({ suppressSave: true })) {
          render();
        }
        ensureDebugRuntimeState().performance.battleActionMs = nowMs() - actionStarted;
        endBattleRenderCounting();
        return;
      }
      fight.actionLock = true;
      if (action.type === "move") {
        moveActor(fight, "player", actionKey);
        if (!updateBattleSubtree({ suppressSave: true })) {
          render();
        }
        ensureDebugRuntimeState().performance.battleActionMs = nowMs() - actionStarted;
        scheduleFightStep("runAiAfterPlayer", ACTION_DELAY_MS);
        return;
      }
      if (action.type === "defense") {
        applyDefenseAction(fight, "player", actionKey);
        if (!updateBattleSubtree({ suppressSave: true })) {
          render();
        }
        ensureDebugRuntimeState().performance.battleActionMs = nowMs() - actionStarted;
        scheduleFightStep("runAiAfterPlayer", ACTION_DELAY_MS);
        return;
      }
      strikeOutcome = strikeActor(fight, "player", actionKey);
      if (!updateBattleSubtree({ suppressSave: true })) {
        render();
      }
      ensureDebugRuntimeState().performance.battleActionMs = nowMs() - actionStarted;
      if (strikeOutcome) {
        return;
      }
      scheduleFightStep("finishPlayerFightAction", ACTION_DELAY_MS);
    }

    function renderFightStatsPanel(fight) {
      var html = [];
      ensureFightRulesetState(fight);
      html.push("<div class='battle-panel'><strong>Статистика</strong>");
      html.push("<div class='battle-chip-line'><div class='chip'>Раунд " + fight.round + " / " + fight.roundLimit + "</div><div class='chip'>Ход " + fight.turn + " / " + fight.turnsPerRound + "</div></div>");
      html.push("<div class='battle-panel inset-panel'><strong>Ты</strong>" + meter("Прочность", fight.playerState.hp, fight.playerState.maxHp) + meter("Стамина", fight.playerState.stamina, fight.playerState.maxStamina) + "<div class='battle-chip-line'><div class='chip'>Нокдауны " + fight.playerState.knockdowns + "</div><div class='chip'>Позиция " + (fight.playerState.position.x + 1) + ":" + (fight.playerState.position.y + 1) + "</div><div class='chip'>Защита " + (fight.playerState.defenseMode ? FIGHT_ACTIONS[fight.playerState.defenseMode].label : "Нет") + "</div></div><div class='battle-chip-line'><div class='chip'>Состояние " + fightConditionSummary(state.fighter) + "</div></div></div>");
      html.push("<div class='battle-panel inset-panel'><strong>Соперник</strong>" + meter("Прочность", fight.opponentState.hp, fight.opponentState.maxHp) + meter("Стамина", fight.opponentState.stamina, fight.opponentState.maxStamina) + "<div class='battle-chip-line'><div class='chip'>Нокдауны " + fight.opponentState.knockdowns + "</div><div class='chip'>Позиция " + (fight.opponentState.position.x + 1) + ":" + (fight.opponentState.position.y + 1) + "</div><div class='chip'>Защита " + (fight.opponentState.defenseMode ? FIGHT_ACTIONS[fight.opponentState.defenseMode].label : "Нет") + "</div></div><div class='battle-chip-line'><div class='chip'>Стиль " + (fight.opponent.styleLabel || "Базовый") + "</div></div></div>");
      if (fight.roundCards.length) {
        html.push("<div class='battle-panel inset-panel'><strong>Карточки</strong>");
        html.push("<div class='log-entry'>" + fight.roundCards[0] + "</div>");
        html.push("</div>");
      }
      html.push("</div>");
      return html.join("");
    }

    function renderFightLiveTopbar(fight) {
      var html = [];
      html.push("<div class='battle-health-card'>");
      html.push("<div class='chip gold'>Ты</div>");
      html.push("<div class='battle-stats-line'>" + meter("Прочность", fight.playerState.hp, fight.playerState.maxHp) + "</div>");
      html.push("<div class='battle-stats-line'>" + meter("Стамина", fight.playerState.stamina, fight.playerState.maxStamina) + "</div>");
      html.push("</div>");
      html.push("<div class='battle-health-card right'>");
      html.push("<div class='chip red'>" + fullOpponentName(fight.opponent) + "</div>");
      html.push("<div class='battle-stats-line'>" + meter("Прочность", fight.opponentState.hp, fight.opponentState.maxHp) + "</div>");
      html.push("<div class='battle-stats-line'>" + meter("Стамина", fight.opponentState.stamina, fight.opponentState.maxStamina) + "</div>");
      html.push("</div>");
      return html.join("");
    }

    function renderFightLiveTabs(fight) {
      var activeTab = fight.uiTab || "controls";
      return "" +
        "<button class='" + (activeTab === "controls" ? "button" : "ghost") + "' onclick='openFightTab(\"controls\")'>Управление</button>" +
        "<button class='" + (activeTab === "stats" ? "button" : "ghost") + "' onclick='openFightTab(\"stats\")'>Статистика</button>" +
        "<button class='" + (activeTab === "log" ? "button" : "ghost") + "' onclick='openFightTab(\"log\")'>Лента</button>";
    }

    function renderFightRingBoard(fight) {
      var html = [];
      var x;
      var y;
      var playerCell;
      var opponentCell;
      html.push("<div class='ring-board' id='fight-ring-board'>");
      for (y = 0; y < RING_SIZE; y += 1) {
        html.push("<div class='ring-row'>");
        for (x = 0; x < RING_SIZE; x += 1) {
          playerCell = fight.playerState.position.x === x && fight.playerState.position.y === y;
          opponentCell = fight.opponentState.position.x === x && fight.opponentState.position.y === y;
          html.push("<div class='ring-cell' data-cell='" + (x + 1) + ":" + (y + 1) + "'>" + (playerCell ? "<div id='fight-token-player' class='" + tokenClassFor("player") + "'>Ты</div>" : (opponentCell ? "<div id='fight-token-opponent' class='" + tokenClassFor("opponent") + "'>Он</div>" : "")) + "</div>");
        }
        html.push("</div>");
      }
      html.push("</div>");
      return html.join("");
    }

    function renderFightLiveStage(fight) {
      var html = [];
      var activeTab = fight.uiTab || "controls";
      if (activeTab === "stats") {
        return renderFightStatsPanel(fight);
      }
      if (activeTab === "log") {
        return renderFightLogPanel(fight);
      }
      html.push("<div class='eyebrow'>" + (fight.ruleset && fight.ruleset.label ? fight.ruleset.label + " • " : "") + "Раунд " + fight.round + " / " + fight.roundLimit + " • Ход " + fight.turn + " / " + fight.turnsPerRound + "</div>");
      html.push("<div class='title' style='font-size:28px'>Ринг 5x5</div>");
      if (fight.knockdown && fight.knockdown.text) {
        html.push("<div class='knockdown-banner'>" + fight.knockdown.text + "</div>");
      }
      html.push(renderFightRingBoard(fight));
      html.push(renderFightControlsPanel(fight));
      return html.join("");
    }

    function renderFightLivePanel() {
      var fight = state.fight;
      var html = [];
      ensureFightRulesetState(fight);
      html.push("<div class='battle-shell'>");
      html.push("<div class='battle-topbar' id='fight-live-topbar'>" + renderFightLiveTopbar(fight) + "</div>");
      html.push("<div class='battle-panel'><div class='battle-tabs' id='fight-live-tabs'>" + renderFightLiveTabs(fight) + "</div></div>");
      html.push("<div class='battle-stage" + ((fight.uiTab || "controls") === "controls" ? " controls-stage" : "") + "' id='fight-live-stage'>" + renderFightLiveStage(fight) + "</div>");
      html.push("</div>");
      return html.join("");
    }

    function render(options) {
      var app = document.getElementById("app");
      var html = "";
      var debugHtml = "";
      var renderStarted = new Date().getTime();
      var mainRenderTimer = startPerfTimer("renderGameMs");
      var debugRenderTimer;
      var phaseRenderTimer;
      var phaseSaveTimer;
      options = options || {};
      ensureDebugRuntimeState();
      beginRenderCycle();
      if (state.isSimulationMode) {
        return;
      }
      state.debug.metrics.fullRenderCount += 1;
      if (state.screen === "menu") {
        html = renderMainMenu();
      } else if (state.screen === "archive") {
        html = renderLegendArchive();
      } else if (state.screen === "create") {
        html = renderCreate();
      } else if (state.screen === "end") {
        html = renderEnding();
      } else {
        html = renderGame();
      }
      state.debug.metrics.renderCount += 1;
      state.debug.metrics.lastRenderAt = renderStarted;
      updateDebugPerformanceSnapshot();
      finishPerfTimer(mainRenderTimer);
      if (state.debug && state.debug.enabled) {
        debugRenderTimer = startPerfTimer("renderDebugMs");
        debugHtml = renderDebugPanel();
        finishPerfTimer(debugRenderTimer);
      } else {
        ensureDebugRuntimeState().performance.renderDebugMs = 0;
      }
      app.innerHTML = renderUpdateBanner() + debugHtml + html;
      if (options.performanceRenderMetricKey) {
        phaseRenderTimer = startPerfTimer(options.performanceRenderMetricKey);
        finishPerfTimer(phaseRenderTimer, nowMs() - renderStarted);
      }
      if (options.skipSave !== true) {
        if (options.performanceSaveMetricKey) {
          phaseSaveTimer = startPerfTimer(options.performanceSaveMetricKey);
          scheduleSaveGameState();
          finishPerfTimer(phaseSaveTimer);
        } else {
          scheduleSaveGameState();
        }
      } else if (options.performanceSaveMetricKey) {
        ensureDebugRuntimeState().performance[options.performanceSaveMetricKey] = 0;
      }
      state.debug.metrics.lastRenderMs = new Date().getTime() - renderStarted;
    }

    window.DEBUG = {
      enable: function () {
        state.debug.enabled = true;
        state.debug.open = true;
        render();
      },
      disable: function () {
        state.debug.enabled = false;
        state.debug.open = false;
        render();
      },
      toggle: function () {
        state.debug.enabled = !state.debug.enabled;
        state.debug.open = state.debug.enabled;
        render();
      },
      setSeed: function (seed) {
        state.rng = RNG.createSeededState(seed, seed);
        saveGameState();
        render();
      },
      useNativeRandom: function () {
        state.rng = RNG.createNativeState();
        saveGameState();
        render();
      },
      giveMoney: debugGiveMoney,
      giveFame: debugGiveFame,
      giveStress: debugGiveStress,
      forceEvent: debugForceEvent,
      createNpc: debugCreateNpc,
        giveInjury: debugGiveInjury,
        teleport: debugTeleport,
        quickFight: debugQuickFight,
        battleSmoke: runBattleSmokeTests,
        simulateWeeks: debugSimulateWeeks,
      simulateFights: debugSimulateFights,
      simulateWorldPreset: debugSimulateWorldPreset,
      validateWorld: debugValidateWorld,
      openCountryTeam: debugSelectWorldCountry,
      openWorldFighter: debugSelectWorldFighter,
      forceSelectionWindow: debugForceSelectionWindow,
      forceQualifierTournament: debugForceQualifierTournament,
      forceTeamStatus: debugForceTeamStatus,
      forceTrackTransition: debugForceTrackTransition,
      forceRetirement: debugForceRetirement,
      info: function () {
        return debugInfo();
      }
    };

    window.onload = function () {
      state.screen = "menu";
      try {
        render();
      } catch (error) {
        renderEmergencyMenuShell();
      }
      window.setTimeout(function () {
        try {
          refreshSavedPreview();
          if (state.screen === "menu") {
            try {
              render();
            } catch (renderError) {
              renderEmergencyMenuShell();
            }
          }
        } catch (error) {}
        checkForAppUpdate();
      }, 0);
    };

    window.onresize = function () {
      render();
    };

    window.onfocus = function () {
      checkForAppUpdate();
    };

    window.onbeforeunload = function () {
      saveGameState();
    };

    window.onpagehide = function () {
      saveGameState();
    };

    document.onvisibilitychange = function () {
      if (document.hidden) {
        saveGameState();
      }
    };
  </script>
</head>
<body>
  <div id="app"></div>
</body>
