<html>
<head>
  <title>Fight Simulator</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=9" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <style>

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #0d1117;
      color: #eff4fb;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(196, 73, 37, 0.26), transparent 26%),
        radial-gradient(circle at top right, rgba(229, 180, 90, 0.16), transparent 24%),
        linear-gradient(180deg, #12161d 0%, #0c1015 100%);
      overflow-x: hidden;
      overflow-y: auto;
      font-size: 20px;
      line-height: 1.5;
    }

    * {
      box-sizing: border-box;
    }

    .shell,
    .battle-shell {
      width: 100%;
      min-height: 100vh;
      padding: 12px;
    }

    .update-banner-wrap {
      padding: 12px 12px 0 12px;
    }

    .update-banner {
      padding: 16px 18px;
      background: linear-gradient(135deg, rgba(217, 77, 103, 0.95), rgba(185, 45, 72, 0.95));
      border-color: rgba(255, 255, 255, 0.14);
      color: #fff4f6;
    }

    .update-banner strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .update-banner p {
      margin: 0 0 12px 0;
      font-size: 17px;
      line-height: 1.45;
      color: #fff4f6;
    }

    .update-banner .button {
      min-height: 58px;
      margin-bottom: 0;
      background: #fff4f6;
      color: #8e2039;
    }

    .debug-dock {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .debug-toggle {
      min-width: 72px;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(8, 12, 18, 0.96);
      color: #f8cf76;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .debug-panel {
      width: 320px;
      max-height: 78vh;
      overflow-y: auto;
      padding: 12px 14px;
      border: 1px solid rgba(248, 207, 118, 0.24);
      border-radius: 16px;
      background: rgba(8, 12, 18, 0.96);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
      color: #f5f8ff;
      font-size: 14px;
      line-height: 1.4;
    }

    .debug-panel strong {
      display: block;
      margin-bottom: 8px;
      color: #f8cf76;
      font-size: 15px;
    }

    .debug-row {
      margin-bottom: 6px;
    }

    .debug-row:last-child {
      margin-bottom: 0;
    }

    .debug-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .debug-grid {
      font-size: 0;
      margin-top: 8px;
    }

    .debug-grid .button,
    .debug-grid .ghost,
    .debug-grid .danger {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
      margin-bottom: 8px;
      min-height: 42px;
      padding: 10px 8px;
      font-size: 14px;
      border-radius: 12px;
      vertical-align: top;
    }

    .debug-grid .button:nth-child(2n),
    .debug-grid .ghost:nth-child(2n),
    .debug-grid .danger:nth-child(2n) {
      margin-right: 0;
    }

    .debug-mini {
      color: #ced8e4;
      font-size: 13px;
      line-height: 1.35;
      margin-top: 6px;
    }

    .section-card {
      margin-bottom: 12px;
    }

    .section-toggle {
      display: block;
      width: 100%;
      border: 0;
      background: transparent;
      color: #eff4fb;
      font-size: 23px;
      font-weight: 700;
      text-align: left;
      padding: 0;
      margin: 0;
      cursor: pointer;
    }

    .section-toggle .section-kicker {
      display: block;
      color: #f5c86f;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .section-toggle .section-arrow {
      float: right;
      color: #f5c86f;
      font-size: 18px;
      margin-top: 4px;
    }

    .section-body {
      margin-top: 12px;
    }

    .compact-card {
      padding: 14px;
      margin-bottom: 8px;
      border-radius: 16px;
    }

    .compact-card h3 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .topbar,
    .panel,
    .hero,
    .card,
    .create-card,
    .battle-topbar,
    .battle-stage,
    .battle-bottom,
    .battle-result {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(17, 22, 29, 0.92);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      border-radius: 20px;
    }

    .topbar,
    .panel,
    .hero,
    .battle-topbar,
    .battle-stage,
    .battle-bottom,
    .battle-result {
      padding: 18px;
      margin-bottom: 12px;
    }

    .card,
    .create-card {
      padding: 16px;
      margin-bottom: 10px;
      border-radius: 18px;
    }

    .hero {
      min-height: calc(100vh - 24px);
    }

    .menu-hero {
      min-height: calc(100vh - 24px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      padding-top: 6vh;
      background:
        radial-gradient(circle at top, rgba(211, 66, 66, 0.22), transparent 34%),
        linear-gradient(180deg, rgba(20, 24, 31, 0.98) 0%, rgba(11, 15, 21, 0.98) 100%);
    }

    .menu-stack {
      width: 100%;
      max-width: none;
      margin: 0 auto;
    }

    .menu-title {
      width: 100%;
      margin: 0 0 40px 0;
      color: #ffd8dd;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 122px;
      line-height: 0.86;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 0 0 #000, 0 8px 24px rgba(0, 0, 0, 0.42);
    }

    .menu-title span {
      display: block;
      width: 100%;
      padding: 14px 8px 16px 8px;
      background: linear-gradient(135deg, #d94d67, #b92d48);
      color: #fff4f6;
      box-shadow: 0 16px 34px rgba(185, 45, 72, 0.3);
      transform: rotate(-2deg);
    }

    .menu-actions {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .menu-actions .button,
    .menu-actions .ghost {
      min-height: 84px;
      font-size: 28px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .tab-screen {
      min-height: calc(100vh - 176px);
    }

    .tab-screen > .panel:first-child,
    .tab-screen > .hero:first-child {
      min-height: calc(100vh - 176px);
    }

    .hero .footer-actions {
      margin-top: auto;
      padding-top: 6px;
    }

    .page-stack {
      min-height: calc(100vh - 176px);
    }

    .fill-panel {
      min-height: calc(100vh - 210px);
    }

    .inset-panel {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: none;
    }

    .page-home .panel:first-child {
      min-height: 50vh;
    }

    .page-home .panel:last-child,
    .page-skills .panel:first-child,
    .page-retire .panel:first-child {
      min-height: 34vh;
    }

    .page-careerLog .log-list {
      min-height: 52vh;
    }

    .brand {
      display: block;
      margin-bottom: 12px;
    }

    .eyebrow {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .title {
      font-size: 42px;
      line-height: 1.15;
      font-weight: 700;
      margin: 0;
    }

    .subtitle,
    .muted,
    .empty-state,
    .card p,
    .create-card p {
      color: #ced8e4;
      font-size: 20px;
      line-height: 1.55;
      margin: 0;
    }

    .week-chip,
    .chip {
      display: inline-block;
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #eff4fb;
      font-size: 18px;
      font-weight: 700;
      margin: 0 8px 8px 0;
      vertical-align: top;
    }

    .week-chip {
      background: rgba(255, 255, 255, 0.12);
      color: #ffe7a8;
    }

    .chip.gold {
      background: linear-gradient(135deg, #f4c56b, #dba647);
      color: #10151b;
    }

    .chip.red {
      background: linear-gradient(135deg, #d1583d, #a33227);
      color: #fff4ef;
    }

    .chip.black {
      background: #111111;
      color: #f5f5f5;
    }

    .panel-title {
      margin: 0 0 14px 0;
      font-size: 34px;
      line-height: 1.2;
    }

    .fighter-name {
      font-size: 46px;
      line-height: 1.15;
      font-weight: 700;
      margin: 0 0 12px 0;
    }

    .fighter-class {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .nameplate {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      margin-bottom: 12px;
    }

    .footer-actions,
    .record-row,
    .battle-tabs,
    .battle-chip-line,
    .split-row {
      display: block;
    }

    .footer-actions:after,
    .record-row:after,
    .battle-tabs:after,
    .battle-chip-line:after,
    .split-row:after,
    .topbar:after,
    .battle-topbar:after,
    .battle-bottom:after {
      content: "";
      display: block;
      clear: both;
    }

    .nav-row,
    .battle-mode-row,
    .battle-actions-row {
      font-size: 0;
    }

    .nav-row .button,
    .nav-row .ghost {
      display: inline-block;
      width: 19.2%;
      margin-right: 1%;
      min-width: 0;
      min-height: 56px;
      padding: 12px 4px;
      font-size: 16px;
      vertical-align: top;
    }

    .nav-row .button:last-child,
    .nav-row .ghost:last-child {
      margin-right: 0;
    }

    .create-grid,
    .card-grid,
    .choice-grid,
    .fight-grid {
      display: block;
      margin-top: 14px;
    }

    .create-grid {
      font-size: 0;
    }

    .create-grid .create-card {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
      vertical-align: top;
      font-size: 20px;
    }

    .create-grid .create-card:nth-child(2n) {
      margin-right: 0;
    }

    .npc-card {
      margin-bottom: 12px;
    }

    .npc-meta-line {
      margin: 8px 0 12px 0;
    }

    .npc-action-grid {
      font-size: 0;
      margin-top: 12px;
    }

    .npc-action-grid .button,
    .npc-action-grid .ghost,
    .npc-action-grid .danger {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
      min-width: 0;
      min-height: 58px;
      padding: 12px 10px;
      font-size: 18px;
      vertical-align: top;
    }

    .npc-action-grid .button:nth-child(2n),
    .npc-action-grid .ghost:nth-child(2n),
    .npc-action-grid .danger:nth-child(2n) {
      margin-right: 0;
    }

    .button,
    .ghost,
    .danger {
      display: block;
      width: 100%;
      min-height: 64px;
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      margin: 0 0 10px 0;
      font-size: 21px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      white-space: normal;
    }

    .button {
      background: linear-gradient(135deg, #f4c56b, #dba647);
      color: #10151b;
    }

    .ghost {
      background: #eef2f7;
      color: #10151b;
    }

    .danger {
      background: linear-gradient(135deg, #d1583d, #a33227);
      color: #fff4ef;
    }

    .button[disabled],
    .ghost[disabled],
    .danger[disabled] {
      opacity: 0.4;
      cursor: default;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
    }

    .filter-row .button,
    .filter-row .ghost {
      width: auto;
      min-height: 0;
      margin: 0;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .rankings-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 0;
    }

    .card h3,
    .create-card h3 {
      margin: 0 0 10px 0;
      font-size: 28px;
      line-height: 1.25;
    }

    .meta {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .create-card.selected {
      border-color: rgba(244, 197, 107, 0.88);
      box-shadow: 0 0 0 1px rgba(244, 197, 107, 0.32), 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .meter-block {
      margin-top: 12px;
    }

    .meter-row {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .meter-row span {
      color: #d7e0ea;
    }

    .meter-row strong {
      float: right;
      color: #ffffff;
    }

    .meter {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(135deg, #f4c56b, #dba647);
    }

    .empty-state {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
    }

    .log-list {
      margin-top: 12px;
    }

    .log-entry {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 10px;
      font-size: 20px;
      line-height: 1.5;
    }

    .log-entry.good {
      border-left: 4px solid #61d59a;
    }

    .log-entry.warn {
      border-left: 4px solid #f5c86f;
    }

    .log-entry.bad {
      border-left: 4px solid #d1583d;
    }

    .battle-shell {
      padding: 12px;
    }

    .battle-topbar,
    .battle-stage,
    .battle-bottom {
      width: 100%;
    }

    .battle-stage {
      min-height: 58vh;
    }

    .battle-result {
      min-height: calc(100vh - 24px);
    }

    .battle-health-card {
      width: 100%;
      margin-bottom: 10px;
    }

    .battle-health-card:last-child,
    .battle-column:last-child,
    .battle-panel:last-child,
    .panel:last-child,
    .card:last-child,
    .create-card:last-child {
      margin-bottom: 0;
    }

    .battle-column,
    .summary-box {
      width: 100%;
      margin-bottom: 10px;
    }

    .battle-panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .battle-panel strong {
      display: block;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .battle-log {
      max-height: none;
      overflow: visible;
    }

    .battle-tabs .button,
    .battle-tabs .ghost {
      display: inline-block;
      width: 32%;
      margin-right: 1%;
      min-width: 0;
      min-height: 54px;
      padding: 12px 8px;
      font-size: 20px;
    }

    .battle-tabs .button:last-child,
    .battle-tabs .ghost:last-child {
      margin-right: 0;
    }

    .battle-actions-row .button,
    .battle-actions-row .ghost,
    .battle-actions-row .danger {
      width: 100%;
      min-height: 72px;
      padding: 14px 12px;
      margin-bottom: 6px;
    }

    .battle-mode-row .button,
    .battle-mode-row .ghost {
      display: inline-block;
      width: 32%;
      margin-right: 2%;
      min-width: 0;
      vertical-align: top;
    }

    .battle-mode-row .button:nth-child(3n),
    .battle-mode-row .ghost:nth-child(3n) {
      margin-right: 0;
    }

    .battle-actions-row .fight-action-item {
      width: 100%;
      margin-bottom: 12px;
      vertical-align: top;
    }

    .battle-actions-row.move-grid .fight-action-item {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
    }

    .battle-actions-row.move-grid .fight-action-item:nth-child(2n) {
      margin-right: 0;
    }

    .battle-actions-row.attack-grid .fight-action-item {
      display: inline-block;
      width: 32%;
      margin-right: 2%;
    }

    .battle-actions-row.attack-grid .fight-action-item:nth-child(3n) {
      margin-right: 0;
    }

    .battle-actions-row.defense-grid .fight-action-item {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
    }

    .battle-actions-row.defense-grid .fight-action-item:nth-child(2n) {
      margin-right: 0;
    }

    .battle-stage {
      min-height: 0;
      padding-bottom: 14px;
    }

    .controls-stage .ring-board {
      margin-bottom: 12px;
    }

    .action-button-title {
      display: block;
      font-size: 24px;
      line-height: 1.2;
    }

    .action-button-meta {
      display: block;
      font-size: 20px;
      line-height: 1.45;
      font-weight: 800;
      text-align: center;
      padding: 2px 4px 0 4px;
    }

    .action-button-meta span {
      display: block;
      margin: 0 0 4px 0;
    }

    .action-blue {
      color: #7fd0ff;
    }

    .action-red {
      color: #ff8a80;
    }

    .action-yellow {
      color: #ffe189;
    }

    .dev-header {
      margin-bottom: 14px;
    }

    .dev-highlight {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 12px;
    }

    .dev-progress {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      margin-top: 8px;
    }

    .dev-progress span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(135deg, #f4c56b, #dba647);
    }

    .dev-meta {
      color: #ced8e4;
      font-size: 18px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .dev-mini {
      color: #ced8e4;
      font-size: 17px;
      line-height: 1.45;
      margin-top: 6px;
    }

    .perk-card.active {
      border-color: rgba(244, 197, 107, 0.68);
      box-shadow: 0 0 0 1px rgba(244, 197, 107, 0.22), 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .perk-state {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .perk-state.ready {
      color: #ffe189;
    }

    .perk-state.locked {
      color: #ced8e4;
    }

    .perk-state.active {
      color: #61d59a;
    }

    .knockdown-banner {
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(209, 88, 61, 0.95), rgba(163, 50, 39, 0.95));
      color: #fff4ef;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ring-board {
      display: block;
      width: 100%;
      max-width: none;
      height: 92vw;
      min-height: 360px;
      max-height: 520px;
      margin: 16px auto 0 auto;
      padding: 44px 8px 48px 8px;
      background-color: #d9dee6;
      background-image: url('ring_top_view.png');
      background-repeat: no-repeat;
      background-position: center 33%;
      background-size: 132% 130%;
      text-align: center;
      font-size: 0;
    }

    .ring-row {
      display: block;
      white-space: nowrap;
      margin-bottom: 8px;
    }

    .ring-cell {
      width: 18%;
      height: 16vw;
      min-height: 54px;
      max-height: 76px;
      margin: 0 1% 0 1%;
      display: inline-block;
      vertical-align: top;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(15, 20, 28, 0.12);
      position: relative;
      text-align: center;
    }

    .ring-cell:after {
      content: attr(data-cell);
      position: absolute;
      right: 5px;
      bottom: 4px;
      color: rgba(255, 255, 255, 0.28);
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .token {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: inline-block;
      margin: 6px auto 0 auto;
      line-height: 42px;
      text-align: center;

    function checkForAppUpdate() {

      if (!supportsRemoteUpdateCheck()) {

      url = "version.json?t=" + new Date().getTime();
      xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function () {
        var payload;
        if (xhr.readyState !== 4) {
          return;
        }
        if (xhr.status !== 200 && xhr.status !== 0) {
          return;
        }
        try {
          payload = JSON.parse(xhr.responseText);
        } catch (error) {
          return;
        }
        if (!payload || !payload.version) {
          return;
        }
        state.remoteVersion = payload.version;
        state.updateAvailable = payload.version !== APP_VERSION;
        render();
      };
      xhr.open("GET", url, true);
      xhr.setRequestHeader("Cache-Control", "no-cache, no-store, must-revalidate");
      xhr.send(null);
    }

        return;
      }
      for (i = 0; i < keys.length; i += 1) {
        if (typeof bonuses[keys[i]] === "number") {
          context[keys[i]] += bonuses[keys[i]] * multiplier;
        }
      }
      if (typeof bonuses.damageMultiplier === "number") {
        context.damage += bonuses.damageMultiplier * multiplier;
      }
      if (typeof bonuses.incomingDamageMultiplier === "number") {
        context.incomingDamage += bonuses.incomingDamageMultiplier * multiplier;
      }
      mergeFightContextMap(context.actionAccuracy, bonuses.actionAccuracy, multiplier);
      mergeFightContextMap(context.actionDamage, bonuses.actionDamage, multiplier);
      mergeFightContextMap(context.actionStamina, bonuses.actionStamina, multiplier);
      mergeFightContextMap(context.ai, bonuses.ai, multiplier);
      if (typeof bonuses.injuryRecovery === "number") {
        context.tags.injuryRecovery = (context.tags.injuryRecovery || 0) + bonuses.injuryRecovery * multiplier;
      }
    }

    function moraleFightContext(fighter) {
      var context = emptyFightContext();
      if (!fighter) {
        return context;
      }
      if (fighter.morale >= 72) {
        context.accuracy += 2;
        context.damage += 0.04;
        context.dodge += 2;
        context.turnStaminaRecovery += 1;
        context.tags.goodMorale = true;
        addFightContextNote(context, "Хорошее настроение помогает держать темп.", false);
      } else if (fighter.morale >= 60) {
        context.accuracy += 1;
      } else if (fighter.morale <= 30) {
        context.accuracy -= 4;
        context.damage -= 0.05;
        context.dodge -= 3;
        context.turnStaminaRecovery -= 1;
        context.tags.lowMorale = true;
        addFightContextNote(context, "Настроение просело, бой пойдёт тяжелее.", true);
      } else if (fighter.morale <= 45) {
        context.accuracy -= 2;
        context.turnStaminaRecovery -= 1;
      }
      return context;
    }

    function wearFightContext(fighter) {
      var context = emptyFightContext();
      if (!fighter) {
        return context;
      }
      if (fighter.wear >= 75) {
        context.accuracy -= 3;
        context.damage -= 0.06;
        context.dodge -= 4;
        context.turnStaminaRecovery -= 1;
        context.incomingDamage += 0.08;
        context.tags.highWear = true;
        addFightContextNote(context, "Тело забито, износ уже мешает в бою.", true);
      } else if (fighter.wear >= 50) {
        context.accuracy -= 1;
        context.dodge -= 2;
        context.turnStaminaRecovery -= 1;
      }
      return context;
    }

    function campFightContext(fighter) {
      var context = emptyFightContext();
      var profile = currentCampFightProfile(fighter);
      if (!profile) {
        return context;
      }
      applyFightContextBonuses(context, profile.bonuses, 1);
      context.tags.campLabel = profile.label || "";
      addFightContextNote(context, (profile.label || "Текущий лагерь") + ": " + (profile.note || "лагерь влияет на бой") + ".", false);
      return context;
    }

    function trainerFightContext(fighter, side) {
      var context = emptyFightContext();
      var trainerType;
      var relation;
      var score;
      if (side !== "player") {
        trainerType = fighter && fighter.trainerTypeId ? getTrainerType(fighter.trainerTypeId) : null;
        if (trainerType) {
          context.accuracy += 1;
          context.turnStaminaRecovery += 1;
        }
        return context;
      }
      trainerType = currentTrainerType();
      relation = currentTrainerAssignment() ? findRelationship(currentTrainerAssignment().npcId) : null;
      if (!trainerType || !relation) {
        return context;
      }
      score = typeof relation.score === "number" ? relation.score : 0;
      if (score >= 55) {
        context.accuracy += 2;
        context.dodge += 1;
        context.counterChance += 4;
        context.tags.goodCorner = true;
        addFightContextNote(context, "Тренер держит угол собранным и помогает по ходу боя.", false);
      } else if (score >= 20) {
        context.accuracy += 1;
      } else if (score <= -35) {
        context.accuracy -= 3;
        context.dodge -= 2;
        context.turnStaminaRecovery -= 1;
        context.tags.badCorner = true;
        addFightContextNote(context, "С тренером сейчас плохая связь, угол помогает хуже.", true);
      } else if (score <= -10) {
        context.accuracy -= 1;
      }
      return context;
    }

    function injuryFightContext(fighter) {
      var context = emptyFightContext();
      var injuries = activeInjuries(fighter);
      var i;
      var injury;
      var definition;
      var multiplier;
      for (i = 0; i < injuries.length; i += 1) {
        injury = injuries[i];
        definition = getInjuryType(injury.id);
        if (!definition) {
          continue;
        }
        multiplier = Math.max(1, injury.severity || 1);
        applyFightContextBonuses(context, definition.combat, multiplier);
        context.tags[injury.id] = true;
        addFightContextNote(context, injuryTitle(injury) + ": " + definition.description, true);
      }
      return context;
    }

    function rivalFightContext(offer, side) {
      var context = emptyFightContext();
      if (!offer || (offer.templateId !== "rematch_offer" && offer.templateId !== "street_grudge_rematch")) {
        return context;
      }
      context.accuracy += 2;
      context.damage += 0.05;
      context.startStamina += 4;
      context.incomingDamage += 0.04;
      context.tags.rival = true;
      addFightContextNote(context, (side === "player" ? "Старый счёт заводит тебя сильнее обычного." : "Реванш заводит соперника сильнее обычного."), false);
      return context;
    }

    function opponentArchetypeContext(opponent) {
      var context = emptyFightContext();
      var archetype = opponent && opponent.archetypeId ? getOpponentArchetype(opponent.archetypeId) : null;
      if (!archetype) {
        return context;
      }
      mergeFightContextMap(context.ai, archetype.ai, 1);
      context.tags.archetypeId = archetype.id;
      addFightContextNote(context, archetype.label + ": " + archetype.riskText + ".", false);
      return context;
    }

    function buildFightContextForSide(fighter, opponent, offer, side) {
      var context = emptyFightContext();
      var preparationContext = emptyFightContext();
      var rulesetLayer = emptyFightContext();
      var rulesetBonus = null;
      var ruleset = offerBattleRuleset(offer || { trackId: currentCareerTrackId() });
      var layers = [
        moraleFightContext(fighter),
        wearFightContext(fighter),
        campFightContext(fighter),
        trainerFightContext(fighter, side),
        injuryFightContext(fighter),
        rivalFightContext(offer, side)
      ];
      var i;
      var j;
      if (typeof BattleRulesetEngine !== "undefined" && BattleRulesetEngine.buildFightContextLayer) {
        rulesetBonus = BattleRulesetEngine.buildFightContextLayer(ruleset, fighter, side, offer);
        applyFightContextBonuses(rulesetLayer, rulesetBonus, 1);
        if (rulesetBonus && rulesetBonus.notes instanceof Array) {
          for (j = 0; j < rulesetBonus.notes.length; j += 1) {
            addFightContextNote(rulesetLayer, rulesetBonus.notes[j], false);
          }
        }
        if (rulesetBonus && rulesetBonus.risks instanceof Array) {
          for (j = 0; j < rulesetBonus.risks.length; j += 1) {
            addFightContextNote(rulesetLayer, rulesetBonus.risks[j], true);
          }
        }
        layers.push(rulesetLayer);
      }
      if (typeof SparringCampEngine !== "undefined" && SparringCampEngine.buildPreparationFightContext) {
        preparationContext = SparringCampEngine.buildPreparationFightContext(ensurePersistentGameState(false), opponent, side);
        layers.push(preparationContext);
      }
      if (side === "opponent") {
        layers.push(opponentArchetypeContext(fighter));
      }
      for (i = 0; i < layers.length; i += 1) {
        context.accuracy += layers[i].accuracy;
        context.damage += layers[i].damage;
        context.dodge += layers[i].dodge;
        context.critChance += layers[i].critChance;
        context.blockReduction += layers[i].blockReduction;
        context.counterChance += layers[i].counterChance;
        context.incomingDamage += layers[i].incomingDamage;
        context.startStamina += layers[i].startStamina;
        context.startHp += layers[i].startHp;
        context.turnHealthRecovery += layers[i].turnHealthRecovery;
        context.turnStaminaRecovery += layers[i].turnStaminaRecovery;
        context.roundHealthPercent += layers[i].roundHealthPercent;
        context.roundStaminaPercent += layers[i].roundStaminaPercent;
        mergeFightContextMap(context.actionAccuracy, layers[i].actionAccuracy, 1);
        mergeFightContextMap(context.actionDamage, layers[i].actionDamage, 1);
        mergeFightContextMap(context.actionStamina, layers[i].actionStamina, 1);
        mergeFightContextMap(context.ai, layers[i].ai, 1);
        for (j in layers[i].tags) {
          if (layers[i].tags.hasOwnProperty(j)) {
            context.tags[j] = layers[i].tags[j];
          }
        }
        for (j = 0; j < layers[i].notes.length; j += 1) {
          addFightContextNote(context, layers[i].notes[j], false);
        }
        for (j = 0; j < layers[i].risks.length; j += 1) {
          addFightContextNote(context, layers[i].risks[j], true);
        }
      }
      return context;
    }

    function fightContextBySide(fight, side) {
      if (!fight) {
        return emptyFightContext();
      }
      if (side === "player") {
        if (!fight.playerContext) {
          fight.playerContext = buildFightContextForSide(state.fighter, fight.opponent, fight.offer || null, "player");
        }
        return fight.playerContext;
      }
      if (!fight.opponentContext) {
        fight.opponentContext = buildFightContextForSide(fight.opponent, state.fighter, fight.offer || null, "opponent");
      }
      return fight.opponentContext;
    }

    function fightConditionSummary(fighter) {
      var parts = [];
      var focus = currentCampFightProfile(fighter);
      if (!fighter) {
        return "Состояние не определено.";
      }
      if (fighter.morale <= 40) {
        parts.push("настроение низкое");
      } else if (fighter.morale >= 70) {
        parts.push("настрой хороший");
      }
      if (fighter.wear >= 60) {
        parts.push("износ высокий");
      }
      if (focus && focus.label) {
        parts.push(focus.label.toLowerCase());
      }
      if (activeInjuries(fighter).length) {
        parts.push("травмы: " + fighterInjurySummary(fighter));
      }
      if (!parts.length) {
        parts.push("состояние ровное");
      }
      return parts.join(", ");
    }

    function opponentRiskSummary(opponent) {
      var parts = [];
      var archetype = opponent && opponent.archetypeId ? getOpponentArchetype(opponent.archetypeId) : null;
      if (archetype && archetype.riskText) {
        parts.push(archetype.riskText);
      }
      if (opponent && opponent.styleLabel) {
        parts.push("стиль: " + opponent.styleLabel.toLowerCase());
      }
      if (opponent && activeInjuries(opponent).length) {
        parts.push("но есть проблемы: " + fighterInjurySummary(opponent));
      }
      if (!parts.length) {
        parts.push("бой без ярких перекосов");
      }
      return parts;
    }

    function opponentArchetypeForProfile(profileDef) {
      var mapping = {
        pressure: ["aggressor", "knockout", "aggressor", "technician"],
        block_trap: ["counter", "patient", "counter"],
        counterpace: ["counter", "patient", "technician"],
        jab_control: ["technician", "patient", "technician"],
        body_hunter: ["aggressor", "knockout", "aggressor"]
      };
      var pool = profileDef && mapping[profileDef.id] ? mapping[profileDef.id] : ["technician"];
      return getOpponentArchetype(choice(pool));
    }

    function createInjuryEntry(injuryId, severity, weeksLeft, chronic, source) {
      return {
        id: injuryId,
        severity: clamp(Math.round(severity || 1), 1, 3),
        weeksLeft: Math.max(1, Math.round(weeksLeft || 1)),
        chronic: !!chronic,
        source: source || "",
        appliedWeek: state.fighter ? state.fighter.week : 0
      };
    }

    function addOrUpdateInjury(fighter, injuryId, severity, weeksLeft, source) {
      var injuries = ensureInjuryState(fighter);
      var i;
      var existing;
      for (i = 0; i < injuries.length; i += 1) {
        if (injuries[i] && injuries[i].id === injuryId) {
          existing = injuries[i];
          existing.severity = clamp(existing.severity + Math.max(1, severity) - 1, 1, 3);
          existing.weeksLeft = Math.max(existing.weeksLeft, weeksLeft || 1) + 1;
          existing.chronic = existing.chronic || existing.severity >= 3;
          existing.source = source || existing.source;
          existing.appliedWeek = state.fighter ? state.fighter.week : existing.appliedWeek;
          return existing;
        }
      }
      existing = createInjuryEntry(injuryId, severity, weeksLeft, severity >= 3, source);
      injuries.push(existing);
      return existing;
    }

    function generateOpponentInjuries(opponent, archetype) {
      var injuries = [];
      var condition = opponent ? opponent.condition || 100 : 100;
      if (condition <= 78 && chance(35)) {
        injuries.push(createInjuryEntry(choice(["nose", "cut", "ribs"]), 1, rand(1, 2), false, "camp"));
      }
      if (condition <= 65 && chance(30)) {
        injuries.push(createInjuryEntry(archetype && archetype.id === "knockout" ? "hand" : "exhaustion", 1, rand(1, 2), false, "camp"));
      }
      return injuries;
    }

    function applyInjuryWeekEffects(fighter, action) {
      var injuries = activeInjuries(fighter);
      var kept = [];
      var healed = [];
      var i;
      var injury;
      var definition;
      var recoveryStep;
      var recoveryKind = action && action.meta ? action.meta.kind : "";
      var extraHealthLoss = 0;
      var extraWear = 0;
      var extraStress = 0;
      var trainingPenaltyLogged = false;
      for (i = 0; i < injuries.length; i += 1) {
        injury = injuries[i];
        definition = getInjuryType(injury.id);
        if (!definition) {
          continue;
        }
        fighter.health += (definition.career && definition.career.weeklyHealth ? definition.career.weeklyHealth * injury.severity : 0);
        if (action && action.type === "train") {
          extraHealthLoss += definition.career && definition.career.trainHealth ? definition.career.trainHealth * injury.severity : 0;
          extraWear += definition.career && definition.career.trainWear ? definition.career.trainWear * injury.severity : 0;
          trainingPenaltyLogged = trainingPenaltyLogged || !!(definition.career && (definition.career.trainHealth || definition.career.trainWear));
        }
        if (action && action.type === "travel") {
          extraStress += definition.career && definition.career.travelStress ? definition.career.travelStress * injury.severity : 0;
        }
        recoveryStep = 1;
        if (action && action.type === "recover") {
          if (recoveryKind === "doctor" || recoveryKind === "therapy") {
            recoveryStep += 2;
          } else {
            recoveryStep += 1;
          }
        }
        if (currentCampFightProfile(fighter) && currentCampFightProfile(fighter).bonuses && typeof currentCampFightProfile(fighter).bonuses.injuryRecovery === "number") {
          recoveryStep += currentCampFightProfile(fighter).bonuses.injuryRecovery;
        }
        injury.weeksLeft -= recoveryStep;
        if (injury.weeksLeft <= 0) {
          if (injury.chronic && injury.severity > 1) {
            injury.severity -= 1;
            injury.weeksLeft = 2 + injury.severity;
            injury.chronic = injury.severity > 1;
            kept.push(injury);
          } else {
            healed.push(definition.label.toLowerCase());
          }
        } else {
          kept.push(injury);
        }
      }
      fighter.injuries = kept;
      fighter.health += extraHealthLoss;
      fighter.wear += extraWear;
      fighter.stress += extraStress;
      if (trainingPenaltyLogged) {
        pushLog("Старые травмы мешают лагерю сильнее обычного.", "warn");
      }
      if (extraStress > 0 && action && action.type === "travel") {
        pushLog("Дорога далась тяжелее из-за старых повреждений.", "warn");
      }
      if (healed.length) {
        pushLog("Тело отпускает: " + healed.join(", ") + ".", "good");
      }
    }

    function maybeRegisterPostFightInjury(results, fighter, injuryId, severity, weeksLeft, chanceValue, source) {
      var injury;
      var definition;
      if (!fighter || !chance(chanceValue)) {
        return;
      }
      injury = addOrUpdateInjury(fighter, injuryId, severity, weeksLeft, source);
      definition = getInjuryType(injuryId);
      if (definition) {
        results.push(injuryTitle(injury) + " — " + definition.description);
      }
    }

    function applyPostFightInjuries(fight) {
      var fighter = state.fighter;
      var profile = fight ? fight.playerState : null;
      var results = [];
      var bodyHits;
      var headHits;
      var heavyThrown;
      if (!fighter || !profile || !profile.impactProfile) {
        return results;
      }
      bodyHits = profile.impactProfile.bodyHitsTaken || 0;
      headHits = profile.impactProfile.headHitsTaken || 0;
      heavyThrown = profile.impactProfile.heavyPunchesThrown || 0;
      if (bodyHits >= 2 || profile.damageTaken >= 28) {
        maybeRegisterPostFightInjury(results, fighter, "ribs", profile.knockdowns >= 1 ? 2 : 1, 2 + Math.min(3, bodyHits), clamp(10 + bodyHits * 10 + profile.knockdowns * 12, 5, 80), "fight");
      }
      if (headHits >= 3) {
        maybeRegisterPostFightInjury(results, fighter, "nose", profile.knockdowns >= 1 ? 2 : 1, 2 + Math.min(2, headHits), clamp(12 + headHits * 9 + profile.knockdowns * 8, 5, 75), "fight");
      }
      if (headHits >= 4 || profile.knockdowns >= 1) {
        maybeRegisterPostFightInjury(results, fighter, "cut", 1 + (profile.knockdowns >= 2 ? 1 : 0), 2 + Math.min(2, headHits), clamp(8 + headHits * 8 + profile.knockdowns * 10, 5, 70), "fight");
      }
      if (heavyThrown >= 4) {
        maybeRegisterPostFightInjury(results, fighter, "hand", heavyThrown >= 7 ? 2 : 1, 2 + Math.min(3, Math.floor(heavyThrown / 2)), clamp(heavyThrown * 8, 5, 70), "fight");
      }
      if (profile.damageTaken >= 40 || fight.roundsCompleted >= 4 || profile.knockdowns >= 1) {
        maybeRegisterPostFightInjury(results, fighter, "exhaustion", profile.knockdowns >= 1 ? 2 : 1, 2 + fight.roundsCompleted, clamp(14 + Math.round(profile.damageTaken / 4) + fight.roundsCompleted * 4, 10, 85), "fight");
      }
      return results;
    }

    function applyHousingWeekEffects(fighter) {
      var housing = fighter ? getCurrentLivingArrangement(fighter) : null;
      var supportShift;
      var juniorSupport;
      if (!fighter || !housing) {
        return;
      }
      fighter.stress += housing.weeklyStress || 0;
      fighter.morale += housing.weeklyMorale || 0;
      fighter.wear += housing.weeklyWear || 0;
      supportShift = 0;
      if (isJuniorPhase(fighter)) {
        juniorSupport = JuniorAmateurSystem && JuniorAmateurSystem.getJuniorSupportModel ? JuniorAmateurSystem.getJuniorSupportModel() : {};
        supportShift += housing.supportBonus || 0;
        if (currentTrainerType()) {
          supportShift += housing.trainerSupportBonus || juniorSupport.trainerSupportBonus || 0;
        }
        if (currentGym()) {
          supportShift += housing.gymSupportBonus || juniorSupport.gymSupportBonus || 0;
        }
      } else if (housing.id === "rough" && fighter.support > 0) {
        supportShift = -1;
      } else if (housing.id === "comfortable" && fighter.support < 100) {
        supportShift = 1;
      }
      fighter.support += supportShift;
      if (supportShift !== 0) {
        pushLog("Быт влияет на твою опору: " + (supportShift > 0 ? "+" : "") + supportShift + ".", supportShift > 0 ? "good" : "warn");
      }
      pushLog("Условия жизни '" + housing.label + "': " + housingEffectSummary(housing) + ".", housing.weeklyStress > 0 || housing.weeklyWear > 0 ? "warn" : "good");
    }

    function fighterReadinessBonus(fighter) {
      if (!fighter) {
        return 0;
      }
      return clamp(Math.round((fighter.morale - 50) * 0.12 + (disciplineScore(fighter) - 50) * 0.08 + socialSupportBuffer(fighter) * 2), -10, 10);
    }

    function setHousing(housingId) {
      var fighter = state.fighter;
      var housing = isJuniorPhase(fighter) ? getLivingMode(housingId) : getHousingOption(housingId);
      if (!fighter || !housing) {
        return;
      }
      if (isJuniorPhase(fighter)) {
        if (fighter.livingMode === housingId) {
          return;
        }
        fighter.livingMode = housingId;
      } else {
        if (fighter.housingId === housingId) {
          return;
        }
        fighter.housingId = housingId;
      }
      applyBounds(fighter);
      refreshWorldState();
      pushLog("Теперь ты живёшь так: " + housing.label + ".", "warn");
      render();
    }

    function applySocialRelationEffect(effectDef) {
      var npc;
      var relation;
      var delta;
      if (!effectDef || !effectDef.role) {
        return;
      }
      npc = findNpcByRole(effectDef.role);
      relation = npc ? findRelationship(npc.id) : null;
      if (!npc || !relation) {
        return;
      }
      delta = relationScoreDeltaFromEffect(effectDef);
      relation.score = clampRelationshipScore(relation.score + delta);
      relation.lastInteractionWeek = relationWeekStamp();
      relation.historyEntries = appendHistoryEntry(relation.historyEntries, {
        week: relationWeekStamp(),
        type: "life",
        text: "Личное действие: " + (effectDef.note || "личная встреча") + "."
      }, 16);
      revealNpc(npc.id);
      syncNpcRelationSnapshot(npc.id);
    }

    function actionSocial(actionId) {
      var fighter = state.fighter;
      var option = getSocialAction(actionId);
      var moneyDelta;
      var supportDelta;
      var i;
      var logText;
      if (!fighter || !option) {
        return;
      }
      moneyDelta = option.money || 0;
      if (moneyDelta < 0 && fighter.money < Math.abs(moneyDelta)) {
        pushLog("Сейчас на это не хватает денег.", "bad");
        render();
        return;
      }
      fighter.money += moneyDelta;
      fighter.health += option.health || 0;
      fighter.stress += option.stress || 0;
      supportDelta = option.support || 0;
      if (supportDelta > 0) {
        supportDelta += developmentScalarBonus(fighter, "supportGain");
      }
      fighter.support += supportDelta;
      registerWeeklyAction("social_" + option.id, option.label, option.delta || null, {
        socialAction: option.id
      });
      if (option.relationEffects instanceof Array) {
        for (i = 0; i < option.relationEffects.length; i += 1) {
          applySocialRelationEffect(option.relationEffects[i]);
        }
      }
      applyBounds(fighter);
      logText = option.label + ": ";
      if (option.money) {
        logText += "деньги " + signedMoney(option.money) + ", ";
      }
      logText += "стресс " + signedNumber(option.stress) + ", опора " + signedNumber(supportDelta) + ".";
      pushLog(logText, supportDelta >= 0 ? "good" : "warn");
      spendWeek();
    }

    function applyConditionDelta(fighter, delta) {
      var changes = delta || {};
      var moraleShift;
      if (!fighter) {
        return;
      }
      ensureLifeState();
      moraleShift = changes.morale || 0;
      if (moraleShift < 0) {
        moraleShift += developmentScalarBonus(fighter, "moraleShield");
      }
      fighter.fatigue += changes.fatigue || 0;
      fighter.wear += changes.wear || 0;
      fighter.morale += moraleShift;
      applyBounds(fighter);
    }

    function registerWeeklyAction(type, label, delta, meta) {
      var entry;
      ensureLifeState();
      applyConditionDelta(state.fighter, delta);
      state.world.lastWeekAction = {
        type: type || "idle",
        label: label || "",
        meta: meta ? clonePlainData(meta) : null
      };
      entry = {
        week: state.fighter ? state.fighter.week : 1,
        type: type || "idle",
        label: label || "",
        meta: meta ? clonePlainData(meta) : null

      registerWeeklyAction("camp", result.camp ? result.camp.label : "Лагерь", {

    function trainerSupportScale() {
      var assignment = currentTrainerAssignment();
      var relation = assignment ? findRelationship(assignment.npcId) : null;
      var score;
      if (!assignment || !relation) {
        return 0;
      }
      score = typeof relation.score === "number" ? relation.score : 0;
      if (score <= -60) {
        return 0.2;
      }
      if (score <= -20) {
        return 0.55;
      }
      if (score >= 55) {
        return 1;
      }
      return 0.8;
    }

    function gymBonusValue(key) {

    function trainerBonusValue(key) {

      var scale = trainerSupportScale();
      var baseValue;
      if (!trainerType || !trainerType.bonuses) {
        return 0;
      }
      baseValue = typeof trainerType.bonuses[key] === "number" ? trainerType.bonuses[key] : 0;
      if (baseValue === 0) {
        return 0;
      }
      return Math.round(baseValue * scale);

    function previewAttackModifiers(fight, side, actionKey) {
      var attacker = fightStateBySide(fight, side);
      var defender = fightStateBySide(fight, otherSide(side));
      var fighter = currentFightSideFighter(fight, side);
      var context = fightContextBySide(fight, side);
      var chainCount = previewAttackChain(attacker, actionKey);
      var accuracyShift = 0;
      var damageMultiplier = 1;
      var flatDamage = developmentActionBonus(fighter, "damageByAction", actionKey);
      if (chainCount === 2) {
        accuracyShift -= 10;
        damageMultiplier *= 0.95;
      } else if (chainCount >= 3) {
        accuracyShift -= 15;
        damageMultiplier *= 0.9;
      }
      if (staminaIsLow(attacker)) {
        accuracyShift -= 10;
        damageMultiplier *= 0.9;
      }
      accuracyShift += ringDangerAccuracyBonus(defender.position);
      damageMultiplier *= ringDangerDamageMultiplier(defender.position);
      return {
        accuracyShift: accuracyShift + developmentActionBonus(fighter, "accuracyByAction", actionKey) + (context.accuracy || 0) + (typeof context.actionAccuracy[actionKey] === "number" ? context.actionAccuracy[actionKey] : 0),
        damageMultiplier: damageMultiplier * (1 + (context.damage || 0)),

      var defenderFighter = currentFightSideFighter(fight, side);
      var context = fightContextBySide(fight, side);

    function previewHitChance(fight, side, actionKey) {
      var defender = fightStateBySide(fight, otherSide(side));
      var attackerStats = fightStatsBySide(fight, side);
      var defenderStats = fightStatsBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var modifiers;
      var dodge;
      if (!action || action.type !== "attack") {
        return 0;

      if (!actionReachAllowed(fight, side, actionKey)) {
        return 0;

      modifiers = previewAttackModifiers(fight, side, actionKey);
      dodge = effectiveDodgeChance(fight, otherSide(side), defender, defenderStats);
      return clamp(Math.round(65 + action.hitBonus + attackerStats.tec * 0.5 + modifiers.accuracyShift - dodge), 25, 95);

    function previewDamage(fight, side, actionKey) {
      var defender = fightStateBySide(fight, otherSide(side));
      var defenderContext = fightContextBySide(fight, otherSide(side));
      var attackerStats = fightStatsBySide(fight, side);

    function eventEffectPreview(effect) {
      if (!effect) {
        return "";
      }
      if (effect.type === "resource") {
        if (effect.key === "money") { return "деньги " + signedMoney(effect.delta || 0); }
        if (effect.key === "health") { return "здоровье " + signedNumber(effect.delta || 0); }
        if (effect.key === "stress") { return "стресс " + signedNumber(effect.delta || 0); }
        if (effect.key === "fame") { return "известность " + signedNumber(effect.delta || 0); }
        if (effect.key === "skillPoints") { return "очки навыков " + signedNumber(effect.delta || 0); }
        if (effect.key === "morale") { return "настроение " + signedNumber(effect.delta || 0); }
      }
      if (effect.type === "condition") {
        if (effect.key === "fatigue") { return "усталость " + signedNumber(effect.delta || 0); }
        if (effect.key === "wear") { return "износ " + signedNumber(effect.delta || 0); }
        if (effect.key === "morale") { return "настроение " + signedNumber(effect.delta || 0); }
      }
      if (effect.type === "life") {
        if (effect.key === "support") { return "опора " + signedNumber(effect.delta || 0); }
        if (effect.key === "housingId" && effect.value) { return "жильё: " + effect.value; }
      }
      if (effect.type === "relation") {
        return "отношение с " + eventActorLabel(effect.slot) + " " + relationScoreText(relationScoreDeltaFromEffect(effect));
      }
      if (effect.type === "rivalry") {
        if (typeof effect.deltaTension === "number") { return "напряжение серии " + signedNumber(effect.deltaTension); }
        if (typeof effect.stakes === "number") { return "ставки серии " + signedNumber(effect.stakes); }
        if (typeof effect.deltaBuzz === "number") { return "шум вокруг " + signedNumber(effect.deltaBuzz); }
      }
      return "";
    }

    function eventChoiceImpactSummary(choice) {
      var parts = [];
      var i;
      var preview;
      if (!choice || !(choice.effects instanceof Array)) {
        return "Без изменений.";
      }
      for (i = 0; i < choice.effects.length; i += 1) {
        preview = eventEffectPreview(choice.effects[i]);
        if (preview) {
          parts.push(preview);
        }
      }
      if (!parts.length) {
        return "Без изменений.";
      }
      return parts.join(", ") + ".";
    }

      var direction;
      var probeIndex;
      var candidate = null;
      if (!roundCount) {
        return null;
      }
      for (roundIndex = 0; roundIndex < roundCount; roundIndex += 1) {
        targetIndex = roundCount <= 1 ? 0 : Math.round(((pool.length - 1) * roundIndex) / Math.max(1, roundCount - 1));
        candidate = null;
        for (scan = 0; scan < pool.length; scan += 1) {
          direction = scan % 2 === 0 ? 1 : -1;
          probeIndex = clamp(targetIndex + Math.ceil(scan / 2) * direction, 0, Math.max(0, pool.length - 1));
          if (pool[probeIndex] && !used[pool[probeIndex].id]) {
            candidate = pool[probeIndex];
            break;
          }
        }
        if (!candidate) {
          for (scan = 0; scan < pool.length; scan += 1) {
            if (pool[scan] && !used[pool[scan].id]) {
              candidate = pool[scan];
              break;
            }
          }
        }
        if (!candidate) {
          break;
        }
        used[candidate.id] = true;
        opponentIds.push(candidate.id);
      }
      if (opponentIds.length !== roundCount) {
        return null;
      }
      return {
        id: template.id,
        label: template.label,
        countryId: template.countryId || "",
        scope: template.scope || "country",
        year: template.year || currentCalendarView(state.fighter).year,
        fieldSize: template.fieldSize || 4,
        stageLabels: clonePlainData(template.stageLabels || []),
        currentStageIndex: 0,
        opponentIds: opponentIds,
        rankOrders: clonePlainData(template.rankOrders || []),
        minRankOrder: template.minRankOrder,
        maxRankOrder: template.maxRankOrder
      };
    }

    function applySimpleTournamentFightResult(offer, fight) {
      var gameState;
      var tournamentState;
      var run;
      var restorePlayer = false;
      if (!offer || !offer.simpleTournamentId) {
        return;
      }
      gameState = ensurePersistentGameState(false);
      tournamentState = simpleTournamentRoot(gameState);
      run = tournamentState.activeRun && tournamentState.activeRun.id === offer.simpleTournamentId ? tournamentState.activeRun : null;
      if (!run) {
        return;
      }
      if (fight.result === "win") {
        restorePlayer = true;
        if (run.currentStageIndex >= run.stageLabels.length - 1) {
          pushLog("Ты выигрываешь турнир " + run.label + ".", "good");
          tournamentState.activeRun = null;
        } else {
          run.currentStageIndex += 1;
          pushLog("Победа в турнире. Следующий этап: " + run.stageLabels[run.currentStageIndex] + ".", "good");
        }
      } else {
        tournamentState.activeRun = null;
        pushLog("Ты вылетаешь из турнира " + run.label + ".", "bad");
      }
      syncRuntimeStateFromGame(gameState, { lightweightWorld: true });
      if (restorePlayer) {
        state.fighter.health = 100;
        state.fighter.stamina = 100;
        state.fighter.fatigue = 0;
      }
      applyBounds(state.fighter);
    }

    function ringVector(fromPos, toPos) {
      return { dx: toPos.x - fromPos.x, dy: toPos.y - fromPos.y, adx: Math.abs(toPos.x - fromPos.x), ady: Math.abs(toPos.y - fromPos.y) };
    }

    function attackZone(fromPos, toPos) {
      var vector = ringVector(fromPos, toPos);
      if (vector.adx === 0 && vector.ady === 0) {
        return "same";
      }
      if (Math.max(vector.adx, vector.ady) === 1) {
        return "close";
      }
      if ((vector.adx === 0 && vector.ady <= 2) || (vector.ady === 0 && vector.adx <= 2)) {
        return "line";
      }
      return "far";
    }

    function ringDangerLevel(position) {
      var edgeX = position.x === 0 || position.x === (RING_SIZE - 1);
      var edgeY = position.y === 0 || position.y === (RING_SIZE - 1);
      if (edgeX && edgeY) {
        return "corner";
      }
      if (edgeX || edgeY) {
        return "ropes";
      }
      return "open";
    }

    function ringDangerAccuracyBonus(position) {
      var level = ringDangerLevel(position);
      if (level === "corner") {
        return 30;
      }
      if (level === "ropes") {
        return 15;
      }
      return 0;
    }

    function ringDangerDamageMultiplier(position) {
      var level = ringDangerLevel(position);
      if (level === "corner") {
        return 1.3;
      }
      if (level === "ropes") {
        return 1.15;
      }
      return 1;
    }

    function ringDangerPenalty(position) {
      var level = ringDangerLevel(position);
      if (level === "corner") {
        return 30;
      }
      if (level === "ropes") {
        return 15;
      }
      return 0;
    }

    function ringThreatPenalty(position, targetPosition) {
      var zone = attackZone(position, targetPosition);
      if (zone === "close") {
        return 18;
      }
      if (zone === "line") {
        return 10;
      }
      return 0;
    }

    function animationDirection(fromPos, toPos) {
      var vector = ringVector(fromPos, toPos);
      if (vector.adx >= vector.ady) {
        return vector.dx >= 0 ? "right" : "left";
      }
      return vector.dy >= 0 ? "down" : "up";
    }
